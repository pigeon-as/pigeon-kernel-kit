name: Build Kernel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            file: vmlinux
          - arch: aarch64
            file: Image
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build ARCH=${{ matrix.arch }}

      - name: Verify
        run: make verify
